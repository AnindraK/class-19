        return a+b;

         document.getElementById("id1").innerHTML = add3(5,10)

                }
                document.getElementById("id2").innerHTML = hi(10, 2)

                  let yes = function (a, b) {
                        return a - b;
                    }
                    document.getElementById("id4").innerHTML = yes(10, 2)

          
         
          
         
         
         
    </script>
